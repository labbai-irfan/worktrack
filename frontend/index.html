<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WorkTrack — enterprise work progress, project and issue tracking platform" />
    <title>WorkTrack</title>
    <meta name="theme-color" content="#F6F7FB" />
    <script>
      // Apply theme before first paint to avoid a flash.
      (function () {
        var stored = localStorage.getItem('wt-theme');
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var effective = dark ? 'dark' : 'light';
        if (dark) document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', effective);
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
