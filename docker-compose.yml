# Development stack. MongoDB Atlas is the default database — the local mongo
# service only starts with:  docker compose --profile local-db up
# Secrets come from backend/.env (never embedded here).
services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace backend"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5000:5000'
    env_file:
      - backend/.env
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace frontend -- --host"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    profiles: [local-db]
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  node_modules:
  redis_data:
  mongo_data:
