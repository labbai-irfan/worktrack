name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          # Backend tests use mongodb-memory-server; no external services needed.
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Upload frontend build artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # Deployment is intentionally manual/host-integrated.
  # Add a deploy job here gated on environment secrets when a target is configured.
